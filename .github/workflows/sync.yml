name: Sincronizar Stock Bsale

on:
  schedule:
    # 21:00 hora Chile = 00:00 UTC
    - cron: '0 0 * * *'
  
  # Permite ejecutar manualmente desde GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Ejecutar sincronización
        env:
          BSALE_API_TOKEN: ${{ secrets.BSALE_API_TOKEN }}
          BSALE_CM_TOKEN: ${{ secrets.BSALE_CM_TOKEN }}
          distribuidora_name: ${{ secrets.DISTRIBUIDORA_NAME }}
          price_list_name: ${{ secrets.PRICE_LIST_NAME }}
          cm_price_list_name: ${{ secrets.CM_PRICE_LIST_NAME }}
          price_discount_pct: ${{ secrets.PRICE_DISCOUNT_PCT }}
          oficinas_excluidas: ${{ secrets.OFICINAS_EXCLUIDAS }}
          sync_costs: ${{ secrets.SYNC_COSTS }}
          sync_prices: ${{ secrets.SYNC_PRICES }}
          sync_all: ${{ secrets.SYNC_ALL }}
          dry_run: ${{ secrets.DRY_RUN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python bsale_sync_stock.py
